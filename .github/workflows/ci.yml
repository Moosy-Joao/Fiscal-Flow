name: CI

on:
  push:
    branches: [tests, main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore FiscalFlow.slnx

      - name: Build
        run: dotnet build FiscalFlow.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test FiscalFlow.slnx --configuration Release --no-build --logger trx --results-directory TestResults --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults
          if-no-files-found: warn
